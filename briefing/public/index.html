<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#000000" media="(prefers-color-scheme: dark)" />
  <meta name="theme-color" content="#f5f5f7" media="(prefers-color-scheme: light)" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>Briefing</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <header class="chrome">
    <div class="chrome-inner">
      <div class="chrome-title" id="chrome-title">Briefing</div>
      <div class="chrome-actions">
        <button id="settings-btn" class="glyph" aria-label="Preferences">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
        </button>
        <button id="refresh-btn" class="glyph" aria-label="Refresh">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 0 0-15-6.7L3 8"/><path d="M3 3v5h5"/><path d="M3 12a9 9 0 0 0 15 6.7l3-2.7"/><path d="M21 21v-5h-5"/></svg>
        </button>
      </div>
    </div>
  </header>

  <main class="page">
    <section class="hero">
      <div class="kicker" id="kicker">Today</div>
      <h1 class="display" id="display-title">Briefing</h1>
      <p class="subhead" id="subhead">Curated signal from WSJ, FT, and The Economist.</p>
    </section>

    <nav class="segmented" role="tablist">
      <button class="seg active" data-tab="today" role="tab">Today</button>
      <button class="seg" data-tab="saved" role="tab">Saved</button>
      <span class="seg-thumb"></span>
    </nav>

    <section class="metrics" id="metrics"></section>

    <section id="content" class="content"></section>
  </main>

  <div class="toast" id="toast" aria-live="polite"></div>

  <div class="sheet-backdrop" id="settings-modal" aria-hidden="true">
    <div class="sheet" role="dialog" aria-labelledby="settings-title">
      <div class="sheet-handle"></div>
      <div class="sheet-hdr">
        <button class="sheet-cancel" id="settings-cancel">Cancel</button>
        <h2 id="settings-title">Preferences</h2>
        <button class="sheet-save" id="settings-save">Save</button>
      </div>
      <div class="sheet-body">
        <div class="group">
          <div class="group-hdr">Interests</div>
          <div class="group-card">
            <textarea id="interests-input" class="textarea" rows="8" placeholder="Economic policy&#10;AI regulation&#10;Federal Reserve"></textarea>
          </div>
          <p class="group-note">One per line. First line is highest priority.</p>
        </div>
        <div class="group">
          <div class="group-hdr">Summary length</div>
          <div class="group-card options">
            <button class="option" data-val="short"><span>Short</span><span class="option-meta">2–3 sentences</span></button>
            <button class="option" data-val="medium"><span>Medium</span><span class="option-meta">4–5 sentences</span></button>
            <button class="option" data-val="long"><span>Long</span><span class="option-meta">6–8 sentences</span></button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="/app.js"></script>
</body>
</html>
