<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0a0a0a" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>Briefing</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <div class="app">
    <header class="hdr">
      <div class="hdr-top">
        <div class="brand">Briefing</div>
        <div class="hdr-actions">
          <button id="settings-btn" class="icon-btn" aria-label="Open settings">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
          </button>
          <button id="refresh-btn" class="icon-btn" aria-label="Refresh briefing">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 0 0-15-6.7L3 8"/><path d="M3 3v5h5"/><path d="M3 12a9 9 0 0 0 15 6.7l3-2.7"/><path d="M21 21v-5h-5"/></svg>
          </button>
        </div>
      </div>
      <div class="hdr-meta">
        <span id="today-date"></span>
        <span class="sep"></span>
        <span id="generated-at">—</span>
      </div>
    </header>

    <nav class="tabs">
      <button class="tab active" data-tab="today">Today</button>
      <button class="tab" data-tab="saved">Saved</button>
      <span class="tab-indicator"></span>
    </nav>

    <section class="stats" id="stats"></section>

    <main id="content"></main>

    <div class="toast" id="toast" aria-live="polite"></div>

    <div class="modal-backdrop" id="settings-modal" aria-hidden="true">
      <div class="modal" role="dialog" aria-labelledby="settings-title">
        <div class="modal-hdr">
          <h2 id="settings-title">Preferences</h2>
          <button class="icon-btn modal-close" id="settings-close" aria-label="Close settings">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
          </button>
        </div>
        <div class="modal-body">
          <div class="field">
            <label for="interests-input" class="field-label">Interests</label>
            <p class="field-help">One per line. Top = highest priority. Claude scores every article against this list.</p>
            <textarea id="interests-input" class="textarea" rows="7" placeholder="Economic policy&#10;AI policy & regulation&#10;Federal Reserve"></textarea>
          </div>
          <div class="field">
            <label class="field-label">Summary length</label>
            <div class="segment" id="length-segment" role="radiogroup">
              <button class="segment-btn" data-val="short" role="radio">Short</button>
              <button class="segment-btn" data-val="medium" role="radio">Medium</button>
              <button class="segment-btn" data-val="long" role="radio">Long</button>
            </div>
            <p class="field-help">Short: 2-3 sentences · Medium: 4-5 · Long: 6-8</p>
          </div>
        </div>
        <div class="modal-ftr">
          <button class="btn btn-ghost" id="settings-cancel">Cancel</button>
          <button class="btn btn-primary" id="settings-save">Save &amp; regenerate</button>
        </div>
      </div>
    </div>
  </div>

  <script src="/app.js"></script>
</body>
</html>
